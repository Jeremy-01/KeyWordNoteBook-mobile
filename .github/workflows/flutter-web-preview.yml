name: Flutter Web 预览部署

on:
  push:
    branches:
      - main
      - mobile
      - 'trae/**'
  pull_request:
    branches:
      - main
      - mobile

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 添加 Flutter Web 平台支持
        run: |
          flutter config --enable-web

      - name: 使用 Web 配置文件构建
        run: |
          cd mobile
          cp pubspec_web.yaml pubspec.yaml
          flutter pub get
          flutter build web --release --web-renderer html

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: mobile/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/mobile'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
