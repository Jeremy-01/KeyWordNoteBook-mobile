name: keybook
version: 1.0.0+1
publish_to: 'none'

description: KeyWordNoteBook 移动端 - 密码本管理器

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # 网络
  dio: ^5.4.0
  
  # 本地存储
  sqflite: ^2.3.2
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  
  # 加密
  pointycastle: ^3.7.4
  cryptography: ^2.7.0
  
  # 生物识别
  local_auth: ^2.2.0
  local_auth_android: ^1.0.38
  local_auth_ios: ^1.1.6
  
  # UI
  flutter_slidable: ^3.0.1
  flutter_screenutil: ^5.9.0
  
  # 导入导出
  share_plus: ^7.2.1
  file_picker: ^11.0.2
  csv: ^6.0.0
  
  # 工具
  intl: ^0.18.1
  uuid: ^4.3.3
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1
  equatable: ^2.0.5
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  freezed: ^2.4.6
  riverpod_generator: ^2.3.9
  riverpod_lint: ^2.3.7
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
